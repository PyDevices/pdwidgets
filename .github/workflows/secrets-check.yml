# One-shot diagnostic: confirm org/repo secrets are visible to this repository.
# Run manually from Actions → Check publish secrets → Run workflow.

name: Check publish secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.repository == 'PyDevices/pdwidgets'
    steps:
      - name: Verify required secrets
        env:
          DEPLOY_TOKEN: ${{ secrets.MICROPYTHON_LIB_DEPLOY_TOKEN }}
          TESTPYPI_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          ok=1
          if [[ -n "${DEPLOY_TOKEN}" ]]; then
            echo "MICROPYTHON_LIB_DEPLOY_TOKEN: available"
          else
            echo "::error::MICROPYTHON_LIB_DEPLOY_TOKEN is not available to this repository"
            ok=0
          fi
          if [[ -n "${TESTPYPI_TOKEN}" ]]; then
            echo "TESTPYPI_API_TOKEN: available"
          else
            echo "::error::TESTPYPI_API_TOKEN is not available to this repository"
            ok=0
          fi
          if [[ "$ok" -ne 1 ]]; then
            echo "Fix: Org Settings → Secrets → Actions → open each secret → Repository access → add pdwidgets."
            exit 1
          fi
          echo "All publish secrets are visible to PyDevices/pdwidgets."
