name: Unit tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install ruff
        run: pip install ruff
      - name: Ruff
        run: ruff check src tests scripts
      - name: Unit tests
        run: python -m unittest discover -s tests
